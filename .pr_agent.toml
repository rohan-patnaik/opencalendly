[github_app]
pr_commands = [
  "/describe",
  "/review",
]
feedback_on_draft_pr = true
handle_push_trigger = true
push_commands = [
  "/describe",
  "/review",
]

[review_agent]
comments_location_policy = "summary"
inline_comments_severity_threshold = 3

[pr_reviewer]
extra_instructions = "Focus on correctness, security, regression risk, maintainability, and production-friendly simplicity. Avoid style-only comments and low-signal refactor suggestions."
