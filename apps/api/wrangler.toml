name = "opencalendly-api"
main = "src/index.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[observability.logs]
enabled = true

# Neon-only DB policy:
# - Use Hyperdrive binding for runtime traffic.
# - DATABASE_URL fallback (if used) must be a Neon URL (*.neon.tech).
[vars]
APP_BASE_URL = ""
RESEND_FROM_EMAIL = ""
ENABLE_DEV_AUTH_BOOTSTRAP = ""
DEMO_DAILY_ACCOUNT_LIMIT = ""
DEMO_DAILY_CREDIT_LIMIT = ""
DEMO_CREDIT_BYPASS_EMAILS = ""
GOOGLE_CLIENT_ID = ""
MICROSOFT_CLIENT_ID = ""

[[hyperdrive]]
binding = "HYPERDRIVE"
id = "177ee8cb797040f58ba308bd85fa43cf"

[env.production]
workers_dev = false
routes = [{ pattern = "api.opencalendly.com/*", zone_name = "opencalendly.com" }]

[env.staging]
workers_dev = false
routes = [{ pattern = "api-staging.opencalendly.com/*", zone_name = "opencalendly.com" }]

[env.staging.vars]
APP_BASE_URL = "https://staging.opencalendly.com"
RESEND_FROM_EMAIL = "OpenCalendly Staging <no-reply@staging.opencalendly.com>"

[env.production.vars]
APP_BASE_URL = "https://opencalendly.com"
RESEND_FROM_EMAIL = "OpenCalendly <no-reply@opencalendly.com>"

# Explicit staging Hyperdrive binding.
# Replace with a dedicated staging Hyperdrive ID before private pre-GA sign-off.
[[env.staging.hyperdrive]]
binding = "HYPERDRIVE"
id = "177ee8cb797040f58ba308bd85fa43cf"

# Explicit production Hyperdrive binding.
# Replace with a dedicated production Hyperdrive ID when provisioned.
[[env.production.hyperdrive]]
binding = "HYPERDRIVE"
id = "177ee8cb797040f58ba308bd85fa43cf"
