name: Deploy Production

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy-main
  cancel-in-progress: true

jobs:
  deploy-production:
    if: >
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT || 'opencalendly-web' }}
      CLOUDFLARE_PAGES_PRODUCTION_BRANCH: ${{ vars.CLOUDFLARE_PAGES_PRODUCTION_BRANCH || 'main' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify required web deploy vars
        env:
          APP_BASE_URL: ${{ vars.APP_BASE_URL }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_API_BASE_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL }}
          SENTRY_DSN_WEB: ${{ secrets.SENTRY_DSN_WEB }}
          SENTRY_DSN_API: ${{ secrets.SENTRY_DSN_API }}
          SENTRY_ENVIRONMENT: ${{ vars.SENTRY_ENVIRONMENT || 'production' }}
        run: |
          missing=0
          for key in APP_BASE_URL NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY NEXT_PUBLIC_API_BASE_URL SENTRY_ENVIRONMENT; do
            if [ -z "${!key//[[:space:]]/}" ]; then
              echo "Missing required repository variable: ${key}"
              missing=1
            fi
          done
          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi
          for key in APP_BASE_URL NEXT_PUBLIC_API_BASE_URL; do
            if ! VALUE="${!key}" node -e "const value = process.env.VALUE; try { const url = new URL(value); if (!['http:', 'https:'].includes(url.protocol)) { process.exit(1); } } catch { process.exit(1); }"; then
              echo "Repository variable must be a valid absolute http(s) URL: ${key}"
              exit 1
            fi
          done
          for key in SENTRY_DSN_WEB SENTRY_DSN_API; do
            if [ -z "${!key//[[:space:]]/}" ]; then
              echo "::warning::Optional repository secret is missing; deployment will continue without Sentry reporting: ${key}"
            fi
          done

      - name: Verify required API deploy vars
        env:
          GOOGLE_CLIENT_ID: ${{ vars.GOOGLE_CLIENT_ID }}
          MICROSOFT_CLIENT_ID: ${{ vars.MICROSOFT_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          MICROSOFT_CLIENT_SECRET: ${{ secrets.MICROSOFT_CLIENT_SECRET }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
        run: |
          missing=0
          for key in GOOGLE_CLIENT_ID MICROSOFT_CLIENT_ID GOOGLE_CLIENT_SECRET MICROSOFT_CLIENT_SECRET SESSION_SECRET; do
            if [ -z "${!key//[[:space:]]/}" ]; then
              echo "Missing required API calendar OAuth value: ${key}"
              missing=1
            fi
          done
          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

      - name: Sync API worker calendar OAuth secrets (production)
        working-directory: apps/api
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          MICROSOFT_CLIENT_SECRET: ${{ secrets.MICROSOFT_CLIENT_SECRET }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
        run: |
          printf '%s' "$SESSION_SECRET" | npx wrangler secret put SESSION_SECRET --config wrangler.toml --env production
          printf '%s' "$GOOGLE_CLIENT_SECRET" | npx wrangler secret put GOOGLE_CLIENT_SECRET --config wrangler.toml --env production
          printf '%s' "$MICROSOFT_CLIENT_SECRET" | npx wrangler secret put MICROSOFT_CLIENT_SECRET --config wrangler.toml --env production

      - name: Deploy API worker (production)
        working-directory: apps/api
        env:
          APP_BASE_URL: ${{ vars.APP_BASE_URL }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GOOGLE_CLIENT_ID: ${{ vars.GOOGLE_CLIENT_ID }}
          MICROSOFT_CLIENT_ID: ${{ vars.MICROSOFT_CLIENT_ID }}
          RESEND_FROM_EMAIL: ${{ vars.RESEND_FROM_EMAIL || 'OpenCalendly <no-reply@opencalendly.com>' }}
          SENTRY_DSN_API: ${{ secrets.SENTRY_DSN_API }}
          SENTRY_ENVIRONMENT: ${{ vars.SENTRY_ENVIRONMENT || 'production' }}
        run: |
          npx wrangler deploy \
            --config wrangler.toml \
            --env production \
            --keep-vars \
            --var "APP_BASE_URL:${APP_BASE_URL}" \
            --var "RESEND_FROM_EMAIL:${RESEND_FROM_EMAIL}" \
            --var "GOOGLE_CLIENT_ID:${GOOGLE_CLIENT_ID}" \
            --var "MICROSOFT_CLIENT_ID:${MICROSOFT_CLIENT_ID}"

      - name: Deploy web (Pages production)
        env:
          APP_BASE_URL: ${{ vars.APP_BASE_URL }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_API_BASE_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL }}
          SENTRY_DSN_WEB: ${{ secrets.SENTRY_DSN_WEB }}
          SENTRY_ENVIRONMENT: ${{ vars.SENTRY_ENVIRONMENT || 'production' }}
        run: npm run deploy:web:production

      - name: Verify production domains
        run: |
          max_attempts=8
          for attempt in $(seq 1 "$max_attempts"); do
            echo "Domain check attempt ${attempt}/${max_attempts}"
            if DOMAIN_CHECK_ALLOW_FORBIDDEN=true npm run domain:check:production; then
              exit 0
            fi
            if [ "$attempt" -lt "$max_attempts" ]; then
              sleep_seconds=$((attempt * 15))
              echo "Domain check failed; retrying in ${sleep_seconds}s..."
              sleep "$sleep_seconds"
            fi
          done
          echo "Production domain check failed after retries."
          exit 1
