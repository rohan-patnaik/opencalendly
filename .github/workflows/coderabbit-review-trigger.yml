name: Trigger CodeRabbit Review

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to re-trigger CodeRabbit for.
        required: true
        type: number

permissions:
  issues: write
  pull-requests: write

jobs:
  trigger-coderabbit-review:
    if: >
      github.event_name == 'pull_request' ||
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request != null &&
        github.event.comment.body == '/coderabbit-review'
      )
    runs-on: ubuntu-latest
    steps:
      - name: Request CodeRabbit review for latest head SHA
        uses: actions/github-script@v8
        with:
          script: |
            const allowedAssociations = new Set(['OWNER', 'MEMBER', 'COLLABORATOR']);
            let pr;

            if (context.eventName === 'pull_request') {
              pr = context.payload.pull_request;
            } else if (context.eventName === 'issue_comment') {
              const association = context.payload.comment.author_association;
              if (!allowedAssociations.has(association)) {
                core.info(`Skipping manual CodeRabbit trigger from ${association}.`);
                return;
              }

              const response = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.issue.number,
              });
              pr = response.data;
            } else if (context.eventName === 'workflow_dispatch') {
              const pullNumber = Number.parseInt(core.getInput('pr_number', { required: true }), 10);
              if (!Number.isInteger(pullNumber) || pullNumber <= 0) {
                core.setFailed(`Invalid pr_number input: ${core.getInput('pr_number')}`);
                return;
              }

              const response = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pullNumber,
              });
              pr = response.data;
            } else {
              core.info(`Unsupported event ${context.eventName}.`);
              return;
            }

            // Avoid write-attempt failures on fork PRs where token permissions are reduced.
            if (pr.head.repo.full_name !== `${context.repo.owner}/${context.repo.repo}`) {
              core.info(`Skipping CodeRabbit trigger for fork PR #${pr.number}.`);
              return;
            }

            const marker = `<!-- coderabbit-trigger:${pr.head.sha} -->`;
            const body = `${marker}\n@coderabbitai review`;

            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                per_page: 100,
              },
            );

            const alreadyTriggered = comments.some((comment) => {
              return (
                comment.user?.login === 'github-actions[bot]' &&
                typeof comment.body === 'string' &&
                comment.body.includes(marker)
              );
            });

            if (alreadyTriggered) {
              core.info(`CodeRabbit already triggered for ${pr.head.sha}`);
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body,
            });

            core.info(`Triggered CodeRabbit review for PR #${pr.number} (${pr.head.sha})`);
