name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-test-typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Environment check
        run: npm run env:check

      - name: Lint
        run: npm run lint

      - name: Complexity guardrails
        run: npm run complexity:check:enforce

      - name: Unit tests
        run: npm run test

      - name: Smoke regression tests
        run: npm run test:smoke

      - name: Typecheck
        run: npm run typecheck
